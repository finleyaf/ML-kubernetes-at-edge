apiVersion: v1
kind: Pod
metadata:
  name: mixed-test
  labels:
    workload-type: mixed
    experiment: scheduler-eval
spec:
  containers:
    - name: mixed-stress
      image: polinux/stress
      command: ["stress"]
      args: ["--cpu", "1", "--vm", "1", "--vm-bytes", "128M", "--timeout", "60"]
      resources:
        requests:
          cpu: "200m"
          memory: "128Mi"
        limits:
          cpu: "400m"
          memory: "256Mi"
  restartPolicy: Never
